# ═══════════════════════════════════════════════════════════════
# تكوين Nginx لنظام إدارة المكفولين
# ═══════════════════════════════════════════════════════════════
# 
# الاستخدام:
# 1. انسخ هذا الملف إلى: /etc/nginx/sites-available/sponsorship
# 2. غيّر yourdomain.com إلى نطاقك
# 3. أنشئ رابط رمزي: ln -s /etc/nginx/sites-available/sponsorship /etc/nginx/sites-enabled/
# 4. اختبر التكوين: nginx -t
# 5. أعد تشغيل Nginx: systemctl restart nginx
# ═══════════════════════════════════════════════════════════════

server {
    listen 80;
    listen [::]:80;
    
    server_name yourdomain.com www.yourdomain.com;
    
    # إعادة توجيه HTTP إلى HTTPS (بعد الحصول على SSL)
    # return 301 https://$server_name$request_uri;
    
    # Frontend - ملفات React المبنية
    location / {
        root /var/www/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # Cache للملفات الثابتة
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
    
    # Backend API
    location /api {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # الملفات المرفوعة
    location /uploads {
        alias /var/www/backend/uploads;
        
        # أمان - منع تنفيذ السكريبتات
        location ~ \.(php|jsp|asp|sh|cgi)$ {
            deny all;
        }
    }
    
    # حد أقصى لحجم الملفات المرفوعة (10MB)
    client_max_body_size 10M;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/json application/javascript;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
}

